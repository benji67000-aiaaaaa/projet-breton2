<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breizh - Mots Bretons</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bleu-breton: #003d66;
            --bleu-clair: #0066cc;
            --blanc: #f8f7f5;
            --noir: #1a1a1a;
            --gris: #6b7280;
            --bordure: #e5e7eb;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--blanc);
            color: var(--noir);
        }

        header {
            background: linear-gradient(135deg, var(--bleu-breton) 0%, #005080 100%);
            color: var(--blanc);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 600;
        }

        .lang-switcher {
            display: flex;
            gap: 0.5rem;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: var(--blanc);
            padding: 0.4rem 0.8rem;
            cursor: pointer;
            font-size: 0.8rem;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .lang-btn.active {
            background: var(--blanc);
            color: var(--bleu-breton);
            font-weight: 600;
        }

        main {
            background: linear-gradient(180deg, var(--blanc) 0%, #f0ebe5 100%);
            min-height: calc(100vh - 70px);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .page-content {
            max-width: 700px;
            width: 100%;
        }

        .page-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .btn-back {
            background: var(--blanc);
            color: var(--bleu-breton);
            border: 2px solid var(--bleu-breton);
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            background: var(--bleu-breton);
            color: var(--blanc);
        }

        .page-title {
            color: var(--bleu-breton);
            font-size: 1.8rem;
            font-weight: 600;
        }

        .progress-bar-container {
            margin-bottom: 2rem;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: var(--gris);
            margin-bottom: 0.5rem;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--bordure);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--bleu-breton), var(--bleu-clair));
            transition: width 0.3s ease;
        }

        .card {
            background: var(--blanc);
            border: 3px solid var(--bleu-breton);
            border-radius: 12px;
            padding: 3rem 2rem;
            min-height: 350px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0, 51, 102, 0.1);
            margin-bottom: 2rem;
        }

        .card-word {
            font-size: 2.8rem;
            color: var(--bleu-breton);
            font-weight: 700;
            margin-bottom: 2rem;
            letter-spacing: 1px;
        }

        .card-label {
            font-size: 0.85rem;
            color: var(--gris);
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .card-translation {
            font-size: 1.5rem;
            color: var(--noir);
            opacity: 0;
            transition: opacity 0.4s ease;
            font-weight: 500;
            min-height: 2rem;
        }

        .card-translation.visible {
            opacity: 1;
        }

        .card-hint {
            font-size: 0.9rem;
            color: var(--gris);
            margin-top: 1rem;
            font-style: italic;
        }

        .card-buttons {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 0.8rem 1.8rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: var(--bleu-breton);
            color: var(--blanc);
        }

        .btn-primary:hover {
            background: #005080;
            box-shadow: 0 6px 12px rgba(0, 51, 102, 0.3);
        }

        .btn-secondary {
            background: var(--bordure);
            color: var(--noir);
        }

        .btn-secondary:hover {
            background: #d1d5db;
        }
    </style>
</head>
<body>
    <header>
        <h1>Breizh</h1>
        <div class="lang-switcher">
            <button class="lang-btn active" onclick="switchLang('fr')">FR</button>
            <button class="lang-btn" onclick="switchLang('br')">BR</button>
        </div>
    </header>

    <main>
        <div class="page-content">
            <div class="page-header">
                <a href="index.html" class="btn-back">← Retour</a>
                <h2 class="page-title" id="page-title">Mots Bretons</h2>
            </div>

            <div class="progress-bar-container">
                <div class="progress-info">
                    <span id="progress-label">Progression</span>
                    <span id="flashcard-progress">1/18</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="flashcard-progress-fill" style="width: 5.5%;"></div>
                </div>
            </div>

            <div class="card">
                <div class="card-label" id="card-label">Mot breton</div>
                <div class="card-word" id="current-word">Bonjour</div>
                <div class="card-hint" id="hint">Cliquez sur "Révéler" pour voir la traduction en français</div>
                <div class="card-translation" id="current-translation"></div>
                <div class="card-buttons">
                    <button class="btn btn-primary" onclick="revealWord()" id="reveal-btn">Révéler</button>
                    <button class="btn btn-secondary" onclick="nextWord()" id="next-btn">Suivant</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        const bretonWords = [
            { breton: "Demat", french: "Bonjour" },
            { breton: "Mersi", french: "Merci" },
            { breton: "Mar plz", french: "S'il vous plaît" },
            { breton: "Ya", french: "Oui" },
            { breton: "Ket", french: "Non" },
            { breton: "Ur c'hoant-kuzh", french: "Eau" },
            { breton: "Bara", french: "Pain" },
            { breton: "Mignoned", french: "Amis" },
            { breton: "Ger", french: "Maison" },
            { breton: "Deiz", french: "Jour" },
            { breton: "Noz", french: "Nuit" },
            { breton: "An heol", french: "Soleil" },
            { breton: "An loar", french: "Lune" },
            { breton: "An mor", french: "Mer" },
            { breton: "An avel", french: "Vent" },
            { breton: "Menec'h", french: "Montagne" },
            { breton: "Kuzh-noz", french: "Forêt" },
            { breton: "An spañs", french: "Ciel" }
        ];

        const translations = {
            fr: {
                pageTitle: "Mots Bretons",
                progressLabel: "Progression",
                cardLabel: "Mot breton",
                hint: "Cliquez sur \"Révéler\" pour voir la traduction en français",
                reveal: "Révéler",
                next: "Suivant"
            },
            br: {
                pageTitle: "Gerioù Breizh",
                progressLabel: "Darempred",
                cardLabel: "Gerioù breizh",
                hint: "Klik war \"Diskouez\" evit gwelout an troidigezh",
                reveal: "Diskouez",
                next: "Hañwelh"
            }
        };

        let currentIndex = 0;
        let currentLang = 'fr';

        function showFlashcard() {
            const word = bretonWords[currentIndex];
            document.getElementById('current-word').textContent = word.breton;
            document.getElementById('current-translation').textContent = word.french;
            document.getElementById('current-translation').classList.remove('visible');
            document.getElementById('flashcard-progress').textContent = `${currentIndex + 1}/18`;
            document.getElementById('flashcard-progress-fill').style.width = ((currentIndex + 1) / 18 * 100) + '%';
        }

        function revealWord() {
            document.getElementById('current-translation').classList.add('visible');
        }

        function nextWord() {
            if (currentIndex < bretonWords.length - 1) {
                currentIndex++;
                showFlashcard();
            }
        }

        function switchLang(lang) {
            currentLang = lang;
            localStorage.setItem('language', lang);
            const t = translations[lang];
            
            document.getElementById('page-title').textContent = t.pageTitle;
            document.getElementById('progress-label').textContent = t.progressLabel;
            document.getElementById('card-label').textContent = t.cardLabel;
            document.getElementById('hint').textContent = t.hint;
            document.getElementById('reveal-btn').textContent = t.reveal;
            document.getElementById('next-btn').textContent = t.next;

            document.querySelectorAll('.lang-btn').forEach((btn, i) => {
                btn.classList.remove('active');
                if ((lang === 'fr' && i === 0) || (lang === 'br' && i === 1)) {
                    btn.classList.add('active');
                }
            });
        }

        window.addEventListener('load', () => {
            const lang = localStorage.getItem('language') || 'fr';
            switchLang(lang);
            showFlashcard();
        });
    </script>
</body>
</html>
