<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breizh - Expressions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bleu-breton: #003d66;
            --bleu-clair: #0066cc;
            --blanc: #f8f7f5;
            --noir: #1a1a1a;
            --gris: #6b7280;
            --bordure: #e5e7eb;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--blanc);
            color: var(--noir);
        }

        header {
            background: linear-gradient(135deg, var(--bleu-breton) 0%, #005080 100%);
            color: var(--blanc);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.8rem;
            font-weight: 600;
        }

        .lang-switcher {
            display: flex;
            gap: 0.5rem;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: var(--blanc);
            padding: 0.4rem 0.8rem;
            cursor: pointer;
            font-size: 0.8rem;
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        .lang-btn.active {
            background: var(--blanc);
            color: var(--bleu-breton);
            font-weight: 600;
        }

        main {
            background: var(--blanc);
            min-height: calc(100vh - 70px);
            padding: 2rem;
        }

        .page-content {
            max-width: 800px;
            margin: 0 auto;
        }

        .page-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .btn-back {
            background: var(--blanc);
            color: var(--bleu-breton);
            border: 2px solid var(--bleu-breton);
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn-back:hover {
            background: var(--bleu-breton);
            color: var(--blanc);
        }

        .page-title {
            color: var(--bleu-breton);
            font-size: 1.8rem;
            font-weight: 600;
        }

        .expressions-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .expression-item {
            background: var(--blanc);
            padding: 1.5rem;
            border-radius: 8px;
            border: 2px solid var(--bordure);
        }

        .expression-breton {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--bleu-breton);
            margin-bottom: 1rem;
            font-style: italic;
        }

        .expression-input {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid var(--bordure);
            border-radius: 6px;
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.95rem;
            margin-bottom: 0.8rem;
            transition: border-color 0.3s ease;
        }

        .expression-input:focus {
            outline: none;
            border-color: var(--bleu-breton);
        }

        .btn {
            padding: 0.8rem 1.8rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn-primary {
            background: var(--bleu-breton);
            color: var(--blanc);
        }

        .btn-primary:hover {
            background: #005080;
        }

        .expression-feedback {
            padding: 0.8rem;
            border-radius: 6px;
            margin-top: 0.8rem;
            display: none;
            border-left: 4px solid #4CAF50;
            font-size: 0.9rem;
        }

        .expression-feedback.correct {
            display: block;
            background: rgba(76, 175, 80, 0.1);
            color: #2e7d32;
        }

        .expression-feedback.incorrect {
            display: block;
            background: rgba(244, 67, 54, 0.1);
            border-left-color: #f44336;
            color: #c62828;
        }
    </style>
</head>
<body>
    <header>
        <h1>Breizh</h1>
        <div class="lang-switcher">
            <button class="lang-btn active" onclick="switchLang('fr')">FR</button>
            <button class="lang-btn" onclick="switchLang('br')">BR</button>
        </div>
    </header>

    <main>
        <div class="page-content">
            <div class="page-header">
                <a href="index.html" class="btn-back">← Retour</a>
                <h2 class="page-title" id="page-title">Expressions Bretonnes</h2>
            </div>

            <div class="expressions-list" id="expressions-container"></div>
        </div>
    </main>

    <script>
        const expressions = [
            { breton: "Gwelloc'h un tataoù a-raok eget e-gred", meaning: "Un moineau dans la main vaut mieux que deux dans le buisson" },
            { breton: "Ne bleuñv ket ar strad", meaning: "Ne pas faire de vagues" },
            { breton: "Kas ar mouged d'an dour", meaning: "Mener quelqu'un en bateau" },
            { breton: "Kac'h evel ur c'has", meaning: "Puer comme un renard" },
            { breton: "Bezañ en tu all eus an noz", meaning: "Être de l'autre côté de la nuit" },
            { breton: "E vugale ar mor", meaning: "Les enfants de la mer (les marins)" },
            { breton: "Skuizhañ evel droug-karantez", meaning: "Fatigué comme par un mauvais amour" }
        ];

        const translations = {
            fr: {
                pageTitle: "Expressions Bretonnes",
                placeholder: "Quel est le sens ?",
                verify: "Vérifier",
                correct: "✓ Correct !",
                incorrect: "✗ Incorrect."
            },
            br: {
                pageTitle: "Komzoued Breizh",
                placeholder: "Petra eo an stumm ?",
                verify: "Gwiriañ",
                correct: "✓ Reuzet !",
                incorrect: "✗ Falc'h."
            }
        };

        function createExpressions() {
            const container = document.getElementById('expressions-container');
            container.innerHTML = '';

            expressions.forEach((expr, index) => {
                const card = document.createElement('div');
                card.className = 'expression-item';
                card.innerHTML = `
                    <div class="expression-breton">"${expr.breton}"</div>
                    <input type="text" class="expression-input" id="expr-${index}" placeholder="Quel est le sens ?" data-meaning="${expr.meaning}">
                    <button class="btn btn-primary" onclick="checkExpression(${index})">Vérifier</button>
                    <div class="expression-feedback" id="feedback-${index}"></div>
                `;
                container.appendChild(card);
            });
            updateLanguage();
        }

        function checkExpression(index) {
            const input = document.getElementById(`expr-${index}`);
            const userAnswer = input.value.toLowerCase().trim();
            const correctAnswer = expressions[index].meaning.toLowerCase();
            const feedback = document.getElementById(`feedback-${index}`);
            const lang = localStorage.getItem('language') || 'fr';
            const t = translations[lang];

            const isCorrect = userAnswer === correctAnswer || userAnswer.includes(correctAnswer.split(' ')[0]);

            if (isCorrect) {
                feedback.className = 'expression-feedback correct';
                feedback.innerHTML = `<strong>${t.correct}</strong> "${expressions[index].meaning}"`;
            } else {
                feedback.className = 'expression-feedback incorrect';
                feedback.innerHTML = `<strong>${t.incorrect}</strong> Réponse: "${expressions[index].meaning}"`;
            }
        }

        function updateLanguage() {
            const lang = localStorage.getItem('language') || 'fr';
            const t = translations[lang];
            document.querySelectorAll('.expression-input').forEach(input => {
                input.placeholder = t.placeholder;
            });
            document.querySelectorAll('.btn-primary').forEach(btn => {
                btn.textContent = t.verify;
            });
        }

        function switchLang(lang) {
            localStorage.setItem('language', lang);
            const t = translations[lang];
            
            document.getElementById('page-title').textContent = t.pageTitle;
            updateLanguage();

            document.querySelectorAll('.lang-btn').forEach((btn, i) => {
                btn.classList.remove('active');
                if ((lang === 'fr' && i === 0) || (lang === 'br' && i === 1)) {
                    btn.classList.add('active');
                }
            });
        }

        window.addEventListener('load', () => {
            const lang = localStorage.getItem('language') || 'fr';
            switchLang(lang);
            createExpressions();
        });
    </script>
</body>
</html>
